<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>SistemaPedidos — Login</title>
</head>
<body>

  <header>
    <h1>SistemaPedidos</h1>
    <p>Ingresá tus credenciales institucionales</p>
  </header>

  <main>
    <form>

      <label for="email">Email</label>
      <input 
        type="email" 
        id="email" 
        name="email" 
        placeholder="tu.usuario@empresa.com" 
        required
      >

      <label for="password">Contraseña</label>
      <input 
        type="password" 
        id="password" 
        name="password" 
        required
      >

      <button type="submit">Iniciar Sesión</button>

      <a href="registro.html">¿Sos nuevo? Solicitá tu cuenta</a>

    </form>
  </main>

  <footer>
    <small>© 2026 SistemaPedidos</small>
  </footer>

</body>
</html>
