<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="assets/css/styles.css">
  <title>SistemaPedidos — Mi Asistencia Semanal</title>
</head>
<body>

  <header>
    <h1>SistemaPedidos</h1>
    <nav>
      <a href="index.html">Inicio</a>
    </nav>
    <p>Empleado Activo</p>
  </header>

  <main>
    <h2>Mi Asistencia Semanal</h2>
    <p>Configurá los días de la semana que vas a asistir a la oficina.</p>

    <form>

      <section>
        <label>Lunes</label>
        <label>
          <input type="radio" name="lunes" value="asisto" required> Asisto
        </label>
        <label>
          <input type="radio" name="lunes" value="no-asisto"> No asisto
        </label>
      </section>

      <section>
        <label>Martes</label>
        <label>
          <input type="radio" name="martes" value="asisto" required> Asisto
        </label>
        <label>
          <input type="radio" name="martes" value="no-asisto"> No asisto
        </label>
      </section>

      <section>
        <label>Miércoles</label>
        <label>
          <input type="radio" name="miercoles" value="asisto" required> Asisto
        </label>
        <label>
          <input type="radio" name="miercoles" value="no-asisto"> No asisto
        </label>
      </section>

      <section>
        <label>Jueves</label>
        <label>
          <input type="radio" name="jueves" value="asisto" required> Asisto
        </label>
        <label>
          <input type="radio" name="jueves" value="no-asisto"> No asisto
        </label>
      </section>

      <section>
        <label>Viernes</label>
        <label>
          <input type="radio" name="viernes" value="asisto" required> Asisto
        </label>
        <label>
          <input type="radio" name="viernes" value="no-asisto"> No asisto
        </label>
      </section>

      <aside>
        <p>Los cambios impactan sobre el menú de la próxima semana.</p>
      </aside>

      <button type="submit">Confirmar Cambios</button>

    </form>

  </main>

  <footer>
    <small>© 2026 SistemaPedidos</small>
  </footer>

</body>
</html>
